<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/x-icon" href="/favicon.ico" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reback React | Responsive Admin Dashboard Template</title>

  <style>
    #splash-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        radial-gradient(circle at 30% 30%, rgba(56, 189, 248, 0.12), transparent 45%),
        radial-gradient(circle at 72% 68%, rgba(59, 130, 246, 0.16), transparent 42%),
        rgba(3, 7, 18, 0.9);
      backdrop-filter: blur(3px);
      z-index: 9999;
      transition: opacity 0.35s ease, visibility 0.35s ease;
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    #splash-screen.show {
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
    }

    .wp-splash-aurora {
      position: absolute;
      border-radius: 50%;
      filter: blur(2px);
    }

    .wp-splash-aurora-left {
      width: 55vw;
      height: 55vw;
      min-width: 380px;
      min-height: 380px;
      left: -8vw;
      top: -10vw;
      background: radial-gradient(circle, rgba(34, 211, 238, 0.22), rgba(34, 211, 238, 0));
      animation: wp-splash-aurora-left 6.2s ease-in-out infinite;
    }

    .wp-splash-aurora-right {
      width: 58vw;
      height: 58vw;
      min-width: 420px;
      min-height: 420px;
      right: -12vw;
      bottom: -14vw;
      background: radial-gradient(circle, rgba(59, 130, 246, 0.2), rgba(59, 130, 246, 0));
      animation: wp-splash-aurora-right 6.8s ease-in-out infinite;
    }

    .wp-splash-stage {
      position: relative;
      width: 120px;
      height: 120px;
      display: grid;
      place-items: center;
      filter: drop-shadow(0 0 18px rgba(56, 189, 248, 0.32));
    }

    .wp-splash-ring {
      position: absolute;
      border-radius: 50%;
      border: 2px solid transparent;
    }

    .wp-splash-ring-a {
      width: 110px;
      height: 110px;
      border-top-color: rgba(56, 189, 248, 0.95);
      border-right-color: rgba(56, 189, 248, 0.32);
      animation: wp-ring-spin 1.35s linear infinite;
    }

    .wp-splash-ring-b {
      width: 80px;
      height: 80px;
      border-left-color: rgba(139, 92, 246, 0.85);
      border-bottom-color: rgba(139, 92, 246, 0.28);
      animation: wp-ring-spin-rev 1.05s linear infinite;
    }

    .wp-splash-ring-c {
      width: 50px;
      height: 50px;
      border-top-color: rgba(125, 211, 252, 0.95);
      animation: wp-ring-spin 0.8s linear infinite;
    }

    @keyframes wp-splash-rise {
      from {
        transform: translateY(8px);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    @keyframes wp-splash-aurora-left {
      0%, 100% { transform: translate(0, 0) scale(1); opacity: 0.85; }
      50% { transform: translate(20px, 14px) scale(1.08); opacity: 1; }
    }

    @keyframes wp-splash-aurora-right {
      0%, 100% { transform: translate(0, 0) scale(1); opacity: 0.82; }
      50% { transform: translate(-24px, -18px) scale(1.07); opacity: 1; }
    }

    @keyframes wp-ring-spin {
      to {
        transform: rotate(360deg);
      }
    }

    @keyframes wp-ring-spin-rev {
      to {
        transform: rotate(-360deg);
      }
    }

    #splash-screen.remove {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      z-index: -1;
    }

    @media (prefers-color-scheme: dark) {
      #splash-screen {
        background:
          radial-gradient(circle at 28% 28%, rgba(56, 189, 248, 0.14), transparent 45%),
          radial-gradient(circle at 74% 66%, rgba(59, 130, 246, 0.17), transparent 42%),
          rgba(2, 6, 23, 0.92);
      }
    }
  </style>

  <script>
    (function () {
      try {
        var localConfig = localStorage.getItem('__REBACK_NEXT_CONFIG__');
        var theme = 'light';
        if (localConfig) {
          var parsedConfig = JSON.parse(localConfig);
          if (parsedConfig && parsedConfig.theme) {
            theme = parsedConfig.theme;
          }
        } else if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
          theme = 'dark';
        }

        if (theme === 'dark') {
          document.write('<style>#splash-screen { background: radial-gradient(circle at 28% 28%, rgba(56, 189, 248, 0.14), transparent 45%), radial-gradient(circle at 74% 66%, rgba(59, 130, 246, 0.17), transparent 42%), rgba(2, 6, 23, 0.92) !important; }</style>');
        }
      } catch (e) {
        // Fallback to media query if parsing fails
      }
    })();
  </script>
</head>

<body>
  <div id="root"></div>
  <div id="splash-screen">
    <div class="wp-splash-aurora wp-splash-aurora-left" aria-hidden="true"></div>
    <div class="wp-splash-aurora wp-splash-aurora-right" aria-hidden="true"></div>
    <div class="wp-splash-stage" role="status" aria-live="polite" aria-label="Loading WorkPing app">
      <span class="wp-splash-ring wp-splash-ring-a"></span>
      <span class="wp-splash-ring wp-splash-ring-b"></span>
      <span class="wp-splash-ring wp-splash-ring-c"></span>
      <span
        style="position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0, 0, 0, 0); white-space: nowrap; border: 0;">Loading...</span>
    </div>
  </div>

  <script type="module" src="/src/main.jsx"></script>
  <script>
    const rootEl = document.querySelector('#root');
    const splashEl = document.querySelector('#splash-screen');

    const showTimer = window.setTimeout(() => {
      if (rootEl && rootEl.childElementCount === 0) {
        splashEl?.classList.add('show');
      }
    }, 1500);

    new MutationObserver(() => {
      window.clearTimeout(showTimer);
      splashEl?.classList.remove('show');
      splashEl?.classList.add('remove');
    }).observe(rootEl, { childList: true });
  </script>
</body>

</html>
