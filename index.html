<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/x-icon" href="/favicon.ico" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reback React | Responsive Admin Dashboard Template</title>

  <style>
    #splash-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: rgba(255, 255, 255, 0.7);
      z-index: 9999;
      transition: all 0.7s linear;
    }

    /* Fallback spinner styles before Bootstrap loads */
    .initial-spinner {
      display: inline-block;
      width: 3rem;
      height: 3rem;
      vertical-align: -0.125em;
      border: 0.25em solid currentColor;
      border-right-color: transparent;
      border-radius: 50%;
      animation: 0.75s linear infinite spinner-border;
      color: #0d6efd;
      /* Bootstrap primary color */
    }

    @keyframes spinner-border {
      to {
        transform: rotate(360deg)
          /* rtl:ignore */
        ;
      }
    }

    #splash-screen.remove {
      animation: fadeout 0.7s forwards;
      z-index: -1;
    }

    @keyframes fadeout {
      to {
        opacity: 0;
        visibility: hidden;
      }
    }

    @media (prefers-color-scheme: dark) {
      #splash-screen {
        background-color: rgba(33, 37, 41, 0.7);
        /* Dark background fallback */
      }
    }
  </style>

  <script>
    (function () {
      try {
        var localConfig = localStorage.getItem('__REBACK_NEXT_CONFIG__');
        var theme = 'light';
        if (localConfig) {
          var parsedConfig = JSON.parse(localConfig);
          if (parsedConfig && parsedConfig.theme) {
            theme = parsedConfig.theme;
          }
        } else if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
          theme = 'dark';
        }

        if (theme === 'dark') {
          document.write('<style>#splash-screen { background-color: rgba(33, 37, 41, 0.7) !important; }</style>');
        }
      } catch (e) {
        // Fallback to media query if parsing fails
      }
    })();
  </script>
</head>

<body>
  <div id="root"></div>
  <div id="splash-screen">
    <div class="initial-spinner" role="status">
      <span
        style="position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0, 0, 0, 0); white-space: nowrap; border: 0;">Loading...</span>
    </div>
  </div>

  <script type="module" src="/src/main.jsx"></script>
  <script>
    const rootEl = document.querySelector('#root')
    new MutationObserver(() => {
      document.querySelector('#splash-screen')?.classList.add('remove');
    }).observe(rootEl, { childList: true });
  </script>
</body>

</html>
